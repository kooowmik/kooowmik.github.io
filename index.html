<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://kit.fontawesome.com/c6b6ed360e.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&family=Noto+Serif+KR:wght@200..900&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        *{
            font-family: "noto serif kr";
        }
        body {
            width: 100vw - 20px;
            height: auto;
            margin: 10px;
        }
        main {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .container {
            width: 100%;
            height: auto;
            display: flex;
            position: relative;
        }
        img {
            width: 100%;
        }
        .pCo{
            position: absolute;
            display: flex;
            flex-direction: column;
            bottom: 10px;
            left: 10px;
            
        }
        .nameTag {
            color: white;
            font-size: 2rem;
            font-weight: medium;
            margin: 0;
        }
        .black {
            display: flex;
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.135),black);
        }
        .title {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
        }
        a {
            color: white;
            font-size: 1.5rem;
        }
        .aka {
            margin: 0;
            color: white;
        }
    </style>
</head>
<body>
    <main>
        <p class="title">대림대 소프트웨어학과 F5</p>
        <div class="container">
            <img src="go.jpg">
            <div class="black"></div>
            <div class="pCo">
                <a href="https://www.instagram.com/jjux5n/"><i class="fa-brands fa-instagram"></i></a>
                <p class="aka">백태사냥꾼</p>
                <p class="nameTag">고명준 192cm</p>
            </div>
        </div>
        <div class="container">
            <img src="gwak.jpg">
            <div class="black"></div>
            <div class="pCo">
                <a href="https://www.instagram.com/07o320_/"><i class="fa-brands fa-instagram"></i></a>
                <p class="aka">수원보"완"관</p>
                <p class="nameTag">곽예건 167cm</p>
            </div>
        </div>
        <div class="container">
            <img src="IMG_5432.jpg">
            <div class="black"></div>
            <div class="pCo">
                <a href="https://www.instagram.com/koowmik/"><i class="fa-brands fa-instagram"></i></a>
                <p class="aka">200억 탈세범</p>
                <p class="nameTag">김동욱 180cm</p>
            </div>
        </div>
        <div class="container">
            <img src="lee.jpg">
            <div class="black"></div>
            <div class="pCo">
                <a href="https://www.instagram.com/sseo__j.un_/"><i class="fa-brands fa-instagram"></i></a>
                <p class="aka">리버스 서장훈</p>
                <p class="nameTag">이서준 158cm</p>
            </div>
        </div>
        <div class="container">
            <img src="jang.jpg">
            <div class="black"></div>
            <div class="pCo">
                <a href="https://www.instagram.com/j.ho0.7/"><i class="fa-brands fa-instagram"></i></a>
                <p class="aka">안양 남주혁</p>
                <p class="nameTag">장지후 8cm</p>
            </div>
        </div>
    </main>
</body>
</html>
