<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&family=Noto+Serif+KR:wght@200..900&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        *{
            font-family: "noto serif kr";
        }
        body {
            width: 100vw - 20px;
            height: auto;
            margin: 10px;
        }
        main {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .container {
            width: 100%;
            height: auto;
            display: flex;
            position: relative;
        }
        img {
            width: 100%;
        }
        .nameTag {
            position: absolute;
            color: white;
            bottom: 10px;
            left: 10px;
            font-size: 2rem;
            font-weight: medium;
            margin: 0;
        }
        .black {
            display: flex;
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.135),black);
        }
        .title {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <main>
        <p class="title">대림대 소프트웨어학과 F5</p>
        <div class="container">
            <img src="고명준.jpg">
            <div class="black"></div>
            <p class="nameTag">고명준 192cm</p>
        </div>
        <div class="container">
            <img src="곽예건.jpg">
            <div class="black"></div>
            <p class="nameTag">곽예건 167cm</p>
        </div>
        <div class="container">
            <img src="IMG_5432.jpg">
            <div class="black"></div>
            <p class="nameTag">김동욱 180cm</p>
        </div>
        <div class="container">
            <img src="이서준.jpg">
            <div class="black"></div>
            <p class="nameTag">이서준 158cm</p>
        </div>
        <div class="container">
            <img src="장지후.jpg">
            <div class="black"></div>
            <p class="nameTag">장지후 8cm</p>
        </div>
    </main>
</body>
</html>
